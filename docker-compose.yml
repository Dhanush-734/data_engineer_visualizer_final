version: '3.9'

services:

  web:

    build: .

    container_name: analytics_app

    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/analytics_db

    depends_on:
      - db

    volumes:
      - .:/app

  db:

    image: postgres:15

    container_name: analytics_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: