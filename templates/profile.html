<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0d0f1a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .profile-wrap { width: 100%; max-width: 420px; padding: 1rem; }

    .profile-card {
      background: #13162a;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
    }

    .profile-banner {
      height: 88px;
      background: linear-gradient(135deg, #7c3aed, #c084fc 50%, #ec4899);
      position: relative;
    }

    .avatar-wrap { position: absolute; bottom: -26px; left: 1.5rem; }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #1e1b4b;
      border: 3px solid #13162a;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #c084fc;
    }

    .profile-body { padding: 2.25rem 1.5rem 1.75rem; }

    .username { font-size: 22px; font-weight: 700; color: #f3f4f6; margin-bottom: 3px; }
    .handle { font-size: 13px; color: #6b7280; margin-bottom: 1.5rem; }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 1.25rem; }

    .stat-row { display: flex; gap: 12px; margin-bottom: 1.5rem; }
    .stat {
      flex: 1;
      background: #1e2236;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.85rem 1rem;
    }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #e5e7eb; }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border: none; border-radius: 10px;
      padding: 10px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; color: #fff;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn svg { width: 14px; height: 14px; }
    body {
  background-color: #0d1117;
  background-image:
    linear-gradient(rgba(99,120,180,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,120,180,0.1) 1px, transparent 1px);
  background-size: 60px 60px;
}
body {
  background-color: #0d1117;
  background-image:
    radial-gradient(ellipse at center, #1a1f35 0%, #0a0c14 70%),
    linear-gradient(rgba(99,120,180,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,120,180,0.07) 1px, transparent 1px);
  background-size: 100% 100%, 60px 60px, 60px 60px;
}
  </style>
</head>
<body>

<div class="profile-wrap">
  <div class="profile-card">
    <div class="profile-banner">
      <div class="avatar-wrap">
        <div class="avatar">{{ username[:1]|upper }}</div>
      </div>
    </div>
    <div class="profile-body">
      <h1 class="username">{{ username }}</h1>
      <p class="handle">@{{ username }}</p>
      <div class="divider"></div>
      <div class="stat-row">
        <div class="stat">
          <p class="stat-label">Total uploads</p>
          <p class="stat-value">{{ uploads }}</p>
        </div>
        <div class="stat">
          <p class="stat-label">Member since</p>
          <div class="stat-value">
    {{ current_user.created_at.strftime('%Y') }}
</div>
        </div>
      </div>
      <a class="btn" href="/dashboard">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 13L5 8l5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to dashboard
      </a>
    </div>
  </div>
</div>

</body>
</html>
