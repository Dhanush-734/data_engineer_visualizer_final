<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — Analytics Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b12;
    --surface: #0e1420;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5ff;
    --accent2: #7c6aff;
    --text: #e8edf5;
    --muted: #5a6478;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; color: var(--text);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift { 0%{background-position:0 0} 100%{background-position:48px 48px} }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
  .orb1 { width:400px;height:400px;background:rgba(0,229,255,0.06);top:-100px;left:-100px; }
  .orb2 { width:300px;height:300px;background:rgba(124,106,255,0.08);bottom:-50px;right:-50px; }

  .wrap {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr;
    width: 900px; max-width: 95vw; min-height: 560px;
    border-radius: 28px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.04);
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .panel-left {
    background: linear-gradient(135deg, #0a0f1e 0%, #0d1528 100%);
    padding: 56px 48px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .panel-left::before {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(0,229,255,0.015) 20px, rgba(0,229,255,0.015) 21px);
  }
  .brand { position: relative; z-index: 1; }
  .brand-mark {
    width:44px;height:44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem;
    color:#070b12; margin-bottom:40px;
  }
  .panel-left h1 {
    font-family:'Syne',sans-serif; font-size:2.4rem; font-weight:800; line-height:1.15;
    background: linear-gradient(135deg,#fff 30%,var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:16px;
  }
  .panel-left p { color:var(--muted); font-size:0.95rem; line-height:1.6; max-width:260px; }
  .stats { position:relative; z-index:1; display:flex; gap:24px; }
  .stat-val { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; color:var(--accent); }
  .stat-label { font-size:0.75rem; color:var(--muted); margin-top:2px; }

  .panel-right {
    background: var(--surface);
    padding: 56px 48px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .panel-right h2 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:700; margin-bottom:8px; }
  .panel-right .sub { color:var(--muted); font-size:0.9rem; margin-bottom:36px; }

  .error-box {
    background:rgba(255,80,80,0.08); border:1px solid rgba(255,80,80,0.2);
    border-radius:10px; padding:10px 14px; font-size:0.85rem;
    color:#ff6b6b; margin-bottom:20px;
  }
  .field { margin-bottom:18px; }
  .field label { display:block; font-size:0.78rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .field input {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,255,0.08); }
  .field input::placeholder { color:var(--muted); }
  .btn {
    width:100%; padding:15px; border:none; border-radius:12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color:#070b12; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
    cursor:pointer; margin-top:8px; transition:opacity 0.2s, transform 0.15s;
  }
  .btn:hover { opacity:0.9; transform:translateY(-1px); }
  .footer-link { text-align:center; margin-top:24px; font-size:0.85rem; color:var(--muted); }
  .footer-link a { color:var(--accent); text-decoration:none; font-weight:500; }

  @media(max-width:680px) {
    .wrap { grid-template-columns:1fr; }
    .panel-left { display:none; }
    .panel-right { padding:40px 28px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrap">
  <div class="panel-left">
    <div class="brand">
      <div class="brand-mark">DS</div>
      <h1>Analytics<br>Studio</h1>
      <p>Upload any dataset. Clean it instantly. Visualize insights in seconds.</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val">ETL</div><div class="stat-label">Auto Pipeline</div></div>
      <div class="stat"><div class="stat-val">∞</div><div class="stat-label">Datasets</div></div>
      <div class="stat"><div class="stat-val">2x</div><div class="stat-label">Chart Types</div></div>
    </div>
  </div>
  <div class="panel-right">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your studio</p>
    {% if error %}<div class="error-box">⚠ {{ error }}</div>{% endif %}
    <form action="/login" method="POST" autocomplete="off">
       <input type="text" style="display:none">
    <input type="password" style="display:none">
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="Enter username" required autofocus autocomplete="off"></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="Enter password" required autocomplete="off"></div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div class="footer-link">No account? <a href="/register">Create one</a></div>
  </div>
</div>
</body>
</html>
