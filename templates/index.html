<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DHANUSH | Analytics Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            margin: 0;
        }

        /* Fixed Card Container */
        .card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header Style */
        .user-tag {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* THE FIX: Corrected Drop Zone */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fafc;
            margin-bottom: 25px;
            display: flex; /* Ensures content stays aligned */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative; /* Container for absolute input */
            overflow: hidden;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        /* Make the invisible input cover the WHOLE area correctly */
        #fileInput {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop-zone i {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
            pointer-events: none; /* Icon won't block the click */
        }

        .drop-zone h3, .drop-zone p {
            pointer-events: none; /* Text won't block the click */
            margin: 5px 0;
        }

        .btn-launch {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: #0f172a;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="user-tag">Dhanush <i class="fas fa-circle" style="color: #22c55e; font-size: 8px; margin-left: 5px;"></i></div>

    <div class="card">
        <h2 style="font-weight: 800; margin-bottom: 10px;">Analytics Studio</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Import your dataset to generate engineering insights</p>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="drop-zone">
                <input type="file" name="file" id="fileInput" accept=".csv, .xlsx">
                <i class="fas fa-cloud-arrow-up"></i>
                <h3 id="mainText">Drop dataset here</h3>
                <p id="subText">or <span style="color: var(--primary); font-weight: 700;">Browse Files</span></p>
            </div>

            <button type="submit" class="btn-launch">
                Initialize Analyzer <i class="fas fa-bolt"></i>
            </button>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const mainText = document.getElementById('mainText');
        const subText = document.getElementById('subText');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                mainText.innerText = "File Selected!";
                subText.innerHTML = `<b style="color: #10b981">${this.files[0].name}</b>`;
                document.querySelector('.drop-zone').style.borderColor = "#10b981";
            }
        });
    </script>
</body>
</html>
